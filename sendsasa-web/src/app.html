<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="icon" type="image/png" href="/assets/images/favicon.ico" />
    <!-- Preconnect to external font/image domains to eliminate cold-connection latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter: preload as style so it downloads early but does NOT block rendering.
         onload swaps it to a real stylesheet once downloaded. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" /></noscript>
    <!-- Preload LCP background image so the browser discovers it before CSS is parsed -->
    <link rel="preload" as="image" href="/assets/images/banner-bg.jpeg" fetchpriority="high" />
    <link rel="stylesheet" href="/assets/css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="/assets/css/scrollCue.css" />
    <link rel="stylesheet" href="/assets/css/tabler-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/britti-sans-trial.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>
      /* Sticky navbar must outrank the fixed-top wrapper (z-index 1030) */
      .navbar.sticky {
        z-index: 1031 !important;
      }

      /* Active/hover underline: sit right below the text, not at the bottom of the 38px padding */
      .navbar .navbar-nav .nav-item .nav-link::before {
        bottom: 36px !important;
      }

      /* Dark-blue sections: force white text so it's readable on #0B47CC */
      .bg-dark-div .fun-fact-single-item h2,
      .bg-dark-div .fun-fact-single-item .h2,
      .bg-dark-div .fun-fact-single-item p {
        color: #fff;
      }
      .bg-dark-div .fun-fact-single-item,
      .bg-dark-div .fun-fact-single-item:last-child {
        border-color: rgba(255, 255, 255, 0.25);
      }

      /* Preloader failsafe: CSS auto-hide after 8 s if JS never runs */
      #preloader {
        animation: preloader-timeout 0.4s 8s forwards;
      }
      @keyframes preloader-timeout {
        to { opacity: 0; visibility: hidden; pointer-events: none; }
      }

      /* scrollCue failsafe: applied by JS timeout to elements still invisible after 3 s */
      .scrollcue-force-visible {
        opacity: 1 !important;
        transform: none !important;
        visibility: visible !important;
        transition: none !important;
      }

      /* GSAP .reveal failsafe: if ScrollTrigger never fires, snap to visible
         after 5 s. The JS pass at 3 s catches most; this catches the rest. */
      .reveal {
        animation: gsap-reveal-fallback 0s 5s both;
      }
      @keyframes gsap-reveal-fallback {
        to { opacity: 1; transform: none; visibility: visible; }
      }

      :root {
        /* Gold (#FFBB00) replaces lime-green as the primary accent:
				   buttons, CTA highlights, underline decorations */
        --bs-primary: #ffbb00;
        --bs-primary-rgb: 255, 187, 0;

        /* Royal blue (#0B47CC) replaces dark teal as the dark surface:
				   top header bar, dark section backgrounds */
        --bs-dark-div: #0b47cc;
        --bs-dark-div-rgb: 11, 71, 204;

        /* Slightly deeper blue for the second dark surface level */
        --bs-dark-div2: #0a3ab5;
        --bs-dark-div2-rgb: 10, 58, 181;

        /* Very light blue tint replaces the lime-tinted card background */
        --bs-gray2: #eef3ff;
        --bs-gray2-rgb: 238, 243, 255;

        /* Gold also replaces orange for star ratings / secondary highlights */
        --bs-warning2: #ffbb00;
        --bs-warning2-rgb: 255, 187, 0;

        /* Override Bootstrap's default rgba(85,85,85,0.75) which gives ~4.0:1 on white.
           Fully opaque #555 gives 6.7:1, passing WCAG AA for all text sizes. */
        --bs-secondary-color: #555555;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/swiper-bundle.min.js"></script>
    <script src="/assets/js/scrollCue.min.js"></script>
    <script src="/assets/js/fslightbox.js"></script>
    <script src="/assets/js/ukiyo.min.js"></script>
  </body>
</html>
